# Portable copy — statestore + MinIO (no repo paths). Project: examples/try/docker/
# Access: postgresql://vulcan:vulcan@localhost:5431/statestore
#         MinIO console http://localhost:9001  API http://localhost:9000

x-images:
  postgres: &postgres_image "postgres:15-alpine"
  minio: &minio_image "minio/minio:latest"
  minio-mc: &minio_mc_image "minio/mc:latest"

volumes:
  objeststore:
    driver: local
  statestore:
    driver: local

networks:
  vulcan:
    external: true

services:
  statestore:
    image: *postgres_image
    environment:
      POSTGRES_DB: statestore
      POSTGRES_USER: vulcan
      POSTGRES_PASSWORD: vulcan
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5431:5432"
    volumes:
      - statestore:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vulcan -d statestore"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - vulcan

  minio:
    image: *minio_image
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    volumes:
      - objeststore:/data
    restart: unless-stopped
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - vulcan

  minio-init:
    image: *minio_mc_image
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 admin password;
      /usr/bin/mc mb myminio/warehouse --ignore-existing;
      /usr/bin/mc anonymous set download myminio/warehouse/queries;
      exit 0;
      "
    networks:
      - vulcan
