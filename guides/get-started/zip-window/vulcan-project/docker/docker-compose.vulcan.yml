x-images:
  # Unified Vulcan image (Python API + Go MySQL server)
  # Version format: MAJOR.MINOR.PATCH.REVISION (e.g., 0.228.1.1)
  vulcan: &vulcan_image "tmdcio/vulcan-postgres:${VERSION:-0.228.1.11}"
  vulcan-graphql: &vulcan_graphql_image "tmdcio/vulcan-graphql:${VERSION:-0.228.1.11}"
  # Lightweight MySQL image (Go binary only, no Python). Same binary supports server and proxy modes.
  # Build: make -C docker mysql-wire
  vulcan-mysql: &vulcan_mysql_image "tmdcio/vulcan-mysql:${MYSQL_VERSION:-0.0.0-exp.04}"

networks:
  vulcan:
    external: true

services:
  # Vulcan API for this example project
  vulcan-api:
    image: *vulcan_image
    working_dir: /workspace
    command: ["vulcan", "--log-to-stdout","api", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      PROJECT_PATH: ${PROJECT_PATH:-/workspace}
      VULCAN__TRANSPILER__BASE_URL: http://host.docker.internal:8100
    ports:
      - "8000:8000"
    volumes:
      - ../:/workspace
    restart: unless-stopped
    networks:
      - vulcan
    # Note: depends_on with external services (statestore, minio) won't work across compose files
    # Ensure infra services are running before starting this service

  # Vulcan GraphQL service
  vulcan-graphql:
    image: *vulcan_graphql_image
    environment:
      VULCAN_API_URL: http://vulcan-api:8000
      VULCAN_TENANT_ID: ${VULCAN_TENANT_ID:-marketing}
      VULCAN_DB_TYPE: ${VULCAN_DB_TYPE:-postgres}
    depends_on:
      - vulcan-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - vulcan

  # Vulcan MySQL service - provides MySQL wire protocol access to Vulcan
  # Uses lightweight image (Go binary only) - same binary as proxy, runs in MODE=server
  # SSL/TLS is MANDATORY - certificates must be mounted
  # Connect using: mysql -h 127.0.0.1 -P 3307 -u <username> -p'<api-key>' --ssl-mode=REQUIRED --enable-cleartext-plugin
  # Or via proxy: mysql -h 127.0.0.1 -P 3306 -u <username> -p'<api-key>' --enable-cleartext-plugin vulcan
  vulcan-mysql:
    image: *vulcan_mysql_image
    ports:
      - "3307:3306"       # MySQL wire protocol - 3307 on host when using proxy (proxy uses 3306)
      - "8081:8080"       # HTTP monitoring endpoints (/health, /livez, /metrics) - mapped to 8081 to avoid conflict with API on 8000
    environment:
      LOG_LEVEL: ${MYSQL_LOG_LEVEL:-debug}
      
      # -------------------------------------------------------------------------
      # Mode Configuration
      # -------------------------------------------------------------------------
      # server: MySQL server with Vulcan API backend (semantic layer queries)
      # proxy: MySQL proxy forwarding to upstream MySQL servers
      # -------------------------------------------------------------------------
      MODE: "server"
      
      # -------------------------------------------------------------------------
      # MySQL Server Configuration
      # -------------------------------------------------------------------------
      MYSQL_HOST: "0.0.0.0"           # Bind to all interfaces
      MYSQL_PORT: "3306"              # Standard MySQL port
      MYSQL_DB_NAME: "vulcan"         # Default database name for semantic layer tables
      MYSQL_MAX_CONNECTIONS: "1000"   # Maximum concurrent connections
      
      # -------------------------------------------------------------------------
      # MySQL Connection Timeouts
      # -------------------------------------------------------------------------
      # These control how long connections can remain idle/active
      # Increase for long-running BI tool sessions
      # -------------------------------------------------------------------------
      MYSQL_HANDSHAKE_TIMEOUT: "10"   # Timeout for initial MySQL handshake (seconds)
      MYSQL_CONN_READ_TIMEOUT: "3600" # Timeout for reading from client - 1 hour for idle BI tools
      MYSQL_CONN_WRITE_TIMEOUT: "300" # Timeout for writing to client - 5 minutes
      SLOW_QUERY_THRESHOLD: "10"      # Log queries taking longer than this (seconds)
      
      # -------------------------------------------------------------------------
      # SSL/TLS Configuration (MANDATORY)
      # -------------------------------------------------------------------------
      # SSL is required for all connections. Generate certificates before starting:
      #   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
      #     -keyout ssl/server.key -out ssl/server.crt \
      #     -subj "/CN=vulcan-mysql"
      # -------------------------------------------------------------------------
      MYSQL_SSL_CERT_FILE: "/ssl/server.crt"
      MYSQL_SSL_KEY_FILE: "/ssl/server.key"
      # MYSQL_SSL_CA_FILE: "/ssl/ca.crt"  # Optional: for client cert verification
      
      # -------------------------------------------------------------------------
      # Heimdall Authentication Service (REQUIRED in server mode)
      # -------------------------------------------------------------------------
      # Heimdall validates user credentials (username/apikey) before allowing
      # MySQL connections. Set HEIMDALL_URL to your DataOS Heimdall endpoint.
      # -------------------------------------------------------------------------
      HEIMDALL_URL: ${HEIMDALL_URL:-https://<your-dataos-context>/heimdall}
      HEIMDALL_AUTH_PATH: /api/v1/authorize
      HEIMDALL_TIMEOUT: "10"
      
      # -------------------------------------------------------------------------
      # DataOS User Identity (REQUIRED in server mode)
      # -------------------------------------------------------------------------
      # The user-id of the person who deployed/runs Vulcan.
      # Used for internal service-to-service calls (Transpiler X-User header).
      # Service will FAIL TO START if not set.
      # -------------------------------------------------------------------------
      DATAOS_RUN_AS_USER: ${DATAOS_RUN_AS_USER:-<your-dataos-username>}
      # Bearer token for server-to-server Vulcan API calls (metadata, query execution).
      # Required when Vulcan API has Heimdall auth enabled.
      DATAOS_RUN_AS_APIKEY: ${DATAOS_RUN_AS_APIKEY:-<your-dataos-api-key>}
      
      # -------------------------------------------------------------------------
      # HTTP Server Configuration (Monitoring Only)
      # -------------------------------------------------------------------------
      HTTP_HOST: "0.0.0.0"
      HTTP_PORT: "8080"
      
      # -------------------------------------------------------------------------
      # Vulcan API Service Configuration (Query Execution)
      # -------------------------------------------------------------------------
      # MySQL server forwards SQL queries to Vulcan API for execution.
      # Note: Endpoint paths are hardcoded in the service, only URL is configurable.
      # -------------------------------------------------------------------------
      VULCAN_API_URL: http://vulcan-api:8000
      
      # Environment (default: prod) and query cache TTL (default: 60 min)
      VULCAN_ENVIRONMENT: ${VULCAN_ENVIRONMENT:-prod}
      VULCAN_QUERY_TTL_MINUTES: ${VULCAN_QUERY_TTL_MINUTES:-60}
      
      # -------------------------------------------------------------------------
      # Vulcan API Query Execution Polling Configuration
      # -------------------------------------------------------------------------
      # Controls how MySQL server polls API for query results.
      # Uses exponential backoff from initial to max delay.
      # -------------------------------------------------------------------------
      VULCAN_API_POLL_INITIAL_MS: "1000"  # Start polling at 1 second
      VULCAN_API_POLL_MAX_MS: "5000"      # Max delay between polls: 5 seconds
      VULCAN_API_QUERY_TIMEOUT: "300"     # Total query timeout: 5 minutes
    volumes:
      - ./ssl:/ssl:ro
    depends_on:
      - vulcan-api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/livez"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - vulcan
 